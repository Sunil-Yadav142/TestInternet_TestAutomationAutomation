trigger:
- main

schedules:
- cron: "30 0 * * *"   # 6:00 AM IST
  displayName: Daily 6AM IST Run
  branches:
    include:
    - main
  always: true

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

steps:

# =========================
# 1. Install .NET SDK
# =========================
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

# =========================
# 2. Restore (EXPLICIT SLN FIX)
# =========================
- script: dotnet restore TestInternet_TestAutomation.sln
  displayName: 'Restore NuGet packages'

# =========================
# 3. Build (EXPLICIT SLN FIX)
# =========================
- script: dotnet build TestInternet_TestAutomation.sln --configuration $(buildConfiguration)
  displayName: 'Build solution'

# =========================
# 4. Run Tests
# =========================
- script: dotnet test TestInternet_TestAutomation.sln --configuration $(buildConfiguration) --logger trx
  displayName: 'Run Selenium NUnit Tests'

# =========================
# 5. Publish Test Results
# =========================
- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '**/*.trx'
    failTaskOnFailedTests: true
    testRunTitle: 'Selenium NUnit Tests'
# 6. Publish Test Logs
# =========================
    - task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'logs'
    ArtifactName: 'TestLogs'
